name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright browser
        run: npx --yes @playwright/test install --with-deps chromium

      - name: Run smoke tests
        run: npx --yes @playwright/test test test/smoke.spec.cjs --workers=1
